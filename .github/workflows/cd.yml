name: CD

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY_NAME=mikago-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME=${BINARY_NAME}.exe
          fi
          go build -o $BINARY_NAME ./cmd/mikago/

      - name: Package (zip/tar.gz)
        run: |
          NAME=mikago-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip ${NAME}.zip ${NAME}.exe
          else
            tar -czvf ${NAME}.tar.gz ${NAME}
          fi

      - name: Generate SHA256
        run: |
          for f in mikago-*; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            mikago-*
            *.sha256

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries

      - name: Generate Release Notes
        id: notes
        run: |
          echo "## 🚀 mikago Release" > RELEASE.md
          echo "" >> RELEASE.md
          echo "### 🔧 Binaries" >> RELEASE.md
          ls -1 mikago-* >> RELEASE.md
          echo "" >> RELEASE.md
          echo "### 🔐 SHA256 Checksums" >> RELEASE.md
          for f in *.sha256; do
            echo "\`$(cat $f)\`  **$f**" >> RELEASE.md
          done
          echo "" >> RELEASE.md
          echo "### 📜 Auto Changelog" >> RELEASE.md
          echo "See commit history for details." >> RELEASE.md

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            mikago-*
            *.sha256
          body_path: RELEASE.md